<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Task Master 2026 | AI Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #FDFDFD;
            --primary: #B2AC88;
            --text: #333;
            --today-border: #FF5252;
            --past-day: #E6E6FA;
            --ai-accent: #6C63FF;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 8px; color: var(--text); }
        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFFFF; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s ease; }
        .progress-container { width: 140px; height: 3px; background: #F0F0F0; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #B2AC88; transition: width 1.5s ease-in-out; }
        .fade-out { opacity: 0; pointer-events: none; }

        /* CARDS */
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .achievement-container { background: white; border-radius: 15px; padding: 12px; border: 1px solid #F0F0F0; }
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ach-section { background: #fcfcfc; padding: 8px; border-radius: 10px; border: 1px solid #f8f8f8; text-align: center; }
        .medal-badge { font-size: 11px; font-weight: bold; padding: 3px 6px; border-radius: 20px; background: #EEE; color: #999; }
        .medal-badge.active { background: #FFF9C4; color: #856404; border: 1px solid #FFEBA1; }

        /* AI MUSIC BAR */
        .ai-music-card { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #eee; }
        .music-info p { margin: 0; font-size: 13px; font-weight: 700; color: #333; }

        /* CALENDAR */
        .calendar-nav { display: flex; overflow-x: auto; gap: 6px; padding: 15px 0 5px 0; scrollbar-width: none; }
        .day-pill { min-width: 45px; padding: 8px 4px; background: #fff; border-radius: 10px; border: 1px solid #F0F0F0; cursor: pointer; text-align: center; flex-shrink: 0; }
        .day-pill.active { background: #FFF9C4 !important; border-color: #FFEB3B; }
        .day-pill.is-today { border: 2px solid var(--today-border); }

        /* HABITS */
        .habit-container { border-radius: 15px; overflow: hidden; border: 1px solid #F0F0F0; }
        .habit-header { background: #fff; padding: 12px; font-weight: 800; border-bottom: 1px solid #F8F8F8; }
        .habit-row { display: flex; border-bottom: 1px solid #F8F8F8; min-height: 55px; background: #fff; }
        .habit-label { flex: 1; padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: 700; }
        .habit-check-area { width: 60px; display: flex; align-items: center; justify-content: center; background: #FFF9C4; border-left: 1px solid #F0F0F0; }
        .custom-checkbox { width: 26px; height: 26px; border: 2px solid #CCC; border-radius: 6px; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .custom-checkbox.checked { background: #BA68C8; border-color: #BA68C8; color: white; }
        .custom-checkbox.checked::after { content: '✓'; }

        /* HISTORY MODERN FIX */
        .history-container { max-height: 0; overflow: hidden; background: white; border-radius: 15px; transition: 0.5s ease-in-out; opacity: 0; }
        .history-container.open { max-height: 2000px; padding: 15px; margin-top: 5px; border: 1px solid #F0F0F0; opacity: 1; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #F9F9F9; }
        .history-item:last-child { border-bottom: none; }
        .history-task-name { font-size: 14px; font-weight: 700; color: #444; flex: 1; }
        .history-stats { text-align: right; }
        .history-perc { font-size: 14px; font-weight: 800; color: var(--primary); }
        .history-count { font-size: 10px; color: #AAA; text-transform: uppercase; }

        /* INPUTS & BUTTONS */
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #EEE; outline: none; }
        .input-group button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; }
        .ai-insight-btn { background: var(--ai-accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 12px rgba(108, 99, 255, 0.2); }
        .ai-response-box { font-size: 13px; color: #444; background: #F0F2FF; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #D0D5FF; display: none; line-height: 1.5; }
        .history-toggle-btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #EEE; background: #FFF; color: #AAA; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* COLORS */
        .row-0 { background-color: #E8F5E9; color: #2E7D32; }
        .row-1 { background-color: #F1F3E9; color: #556B2F; }
        .row-2 { background-color: #E3F2FD; color: #1565C0; }
        .row-3 { background-color: #F3E5F5; color: #6A1B9A; }
        .row-4 { background-color: #FAF3E0; color: #8D6E63; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div style="margin-bottom:20px; font-size:24px; font-weight:bold; color:var(--primary);">Habit Master AI</div>
    <div class="progress-container"><div class="progress-bar" id="load-bar"></div></div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 5px;">
        <h3 style="margin:0; color:var(--primary); font-size: 18px;">Daily Task Master</h3>
        <div style="display:flex; gap:5px;">
            <select id="monthSelect" onchange="initCalendar()" style="border:none; font-weight:bold; background:none; font-size:12px;"></select>
            <select id="yearSelect" onchange="initCalendar()" style="border:none; font-weight:bold; background:none; font-size:12px;"></select>
        </div>
    </div>

    <div class="ai-music-card">
        <div style="font-size:20px;">🎵</div>
        <div class="music-info">
            <span style="font-size:9px; color:#666; font-weight:bold; text-transform: uppercase;">AI Smart Vibe</span>
            <p id="musicStatus">Analyzing your tasks...</p>
        </div>
        <div id="player-container"></div>
    </div>

    <div class="achievement-container">
        <div class="ach-grid">
            <div class="ach-section">
                <div style="font-size:10px; color:#AAA; text-transform: uppercase;">Today</div>
                <div id="dailyPercentText" style="font-size:20px; font-weight:900;">0%</div>
                <div id="dailyMedal" class="medal-badge">No Medal</div>
            </div>
            <div class="ach-section">
                <div style="font-size:10px; color:#AAA; text-transform: uppercase;">Monthly</div>
                <div id="monthlyPercentText" style="font-size:20px; font-weight:900;">0%</div>
                <div id="monthlyMedal" class="medal-badge">No Rank</div>
            </div>
        </div>
    </div>

    <div class="calendar-nav" id="datePicker"></div>

    <div class="card">
        <div class="chart-container" style="height:140px;"><canvas id="habitChart"></canvas></div>
    </div>

    <div class="habit-container">
        <div class="habit-header" id="listTitle">TASKS</div>
        <div id="habitList"></div>
    </div>

    <div class="input-group">
        <input type="text" id="habitInput" placeholder="Enter new task...">
        <button onclick="addHabit()">ADD</button>
    </div>

    <div class="card">
        <div style="font-weight:800; color:#AAA; font-size:10px; text-transform: uppercase; margin-bottom:8px;">Daily Journal</div>
        <textarea id="dayNote" style="width:100%; border:none; font-size:14px; outline:none; min-height:60px; resize: none;" placeholder="How was your day?" oninput="saveNote()"></textarea>
        <button class="ai-insight-btn" onclick="getAIInsight()">✨ GET AI INSIGHT</button>
        <div id="aiResponse" class="ai-response-box"></div>
    </div>

    <div class="history-container" id="historyBox">
        <div style="font-size: 11px; font-weight: 900; color: #AAA; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #EEE; padding-bottom: 5px;">Performance History</div>
        <div id="historyList"></div>
    </div>

    <button class="history-toggle-btn" id="toggleBtn" onclick="toggleHistory()">📊 View Monthly History</button>
    
    <div style="display:flex; gap:10px; justify-content:center; margin-top: 10px;">
        <button onclick="openExport()" style="padding:8px 15px; border-radius:8px; border:1px solid #EEE; background:white; font-size:11px; color:#999;">Backup</button>
        <button onclick="openRestore()" style="padding:8px 15px; border-radius:8px; border:1px solid #EEE; background:white; font-size:11px; color:#999;">Restore</button>
    </div>
    <div style="text-align:center; font-size:10px; color:#DDD; margin:15px; font-weight: bold; letter-spacing: 1px;">DEVELOPED BY PRITAM</div>
</div>

<script>
    const API_KEY = "AIzaSyAmuOKeapPB30Zm1BtvERlGHOPRh3aski4";
    let allData = JSON.parse(localStorage.getItem('HabitPro_Daily_Mode')) || {};
    let notesData = JSON.parse(localStorage.getItem('HabitPro_Notes_Daily')) || {};
    const monthsArr = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const today = new Date();
    let selectedDay = today.getDate();
    let selectedMonth = monthsArr[today.getMonth()];
    let selectedYear = today.getFullYear();
    let myChart;

    window.onload = function() {
        const ms = document.getElementById('monthSelect');
        monthsArr.forEach(m => { let o = document.createElement('option'); o.value = m; o.text = m; if(m === selectedMonth) o.selected = true; ms.add(o); });
        const ys = document.getElementById('yearSelect');
        for(let y=2025; y<=2030; y++) { let o = document.createElement('option'); o.value = y; o.text = y; if(y === selectedYear) o.selected = true; ys.add(o); }
        
        document.getElementById('load-bar').style.width = '100%';
        initChart();
        initCalendar();
        setTimeout(() => document.getElementById('splash-screen').classList.add('fade-out'), 1800);
    };

    function initCalendar() {
        selectedMonth = document.getElementById('monthSelect').value;
        selectedYear = parseInt(document.getElementById('yearSelect').value);
        const picker = document.getElementById('datePicker'); picker.innerHTML = '';
        const days = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const pill = document.createElement('div');
            pill.className = `day-pill ${i === selectedDay ? 'active' : ''} ${(i === today.getDate() && selectedMonth === monthsArr[today.getMonth()]) ? 'is-today' : ''}`;
            pill.innerHTML = `<span style="font-size:9px; color:#BBB;">Day</span><br><b>${i}</b>`;
            pill.onclick = () => { selectedDay = i; updateUI(); };
            picker.appendChild(pill);
            if(i === selectedDay) pill.scrollIntoView({ inline: 'center', behavior: 'smooth' });
        }
        updateUI();
    }

    function updateUI() {
        document.querySelectorAll('.day-pill').forEach((p, idx) => p.classList.toggle('active', (idx + 1) === selectedDay));
        document.getElementById('listTitle').innerText = `${selectedDay} ${selectedMonth} - TASKS`;
        renderHabits();
        loadNote();
        updateChart();
        calculateAchievements();
        updateAIMusic();
        renderPerformanceHistory();
        localStorage.setItem('HabitPro_Daily_Mode', JSON.stringify(allData));
    }

    function renderHabits() {
        const list = document.getElementById('habitList'); list.innerHTML = '';
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        habits.forEach((h, idx) => {
            const row = document.createElement('div'); row.className = 'habit-row';
            row.innerHTML = `<div class="habit-label row-${idx % 5}"><span>${h.text} <small style="opacity:0.4; font-weight:normal;">(${h.time})</small></span><span onclick="deleteHabit(${idx})" style="opacity:0.2; font-size:18px;">×</span></div>
                             <div class="habit-check-area"><div class="custom-checkbox ${h.done ? 'checked' : ''}" onclick="toggleHabit(${idx})"></div></div>`;
            list.appendChild(row);
        });
    }

    function addHabit() {
        const input = document.getElementById('habitInput'); if(!input.value.trim()) return;
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        if(!allData[key]) allData[key] = [];
        allData[key].push({ text: input.value, done: false, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
        input.value = ''; updateUI();
    }

    function toggleHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key][idx].done = !allData[key][idx].done;
        if(allData[key][idx].done) confetti({ particleCount: 50, spread: 70, origin: { y: 0.7 } });
        updateUI();
    }

    function deleteHabit(idx) {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        allData[key].splice(idx, 1); updateUI();
    }

    async function getAIInsight() {
        const box = document.getElementById('aiResponse');
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = allData[key] || [];
        const note = notesData[key] || "No journal entry.";
        const done = habits.filter(h => h.done).map(h => h.text);
        const pending = habits.filter(h => !h.done).map(h => h.text);

        box.style.display = "block"; box.innerText = "✨ AI is thinking...";

        const prompt = `Act as a productivity mentor for Pritam. Today he completed: ${done.join(", ")}. Pending: ${pending.join(", ")}. Journal: ${note}. Give a sharp 2-line advice in a mix of Bengali and English.`;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await resp.json();
            box.innerText = data.candidates[0].content.parts[0].text;
        } catch(e) { 
            box.innerText = "⚠️ Connection Error. If you are using a local file, try opening it in a proper web server or check your internet."; 
        }
    }

    function renderPerformanceHistory() {
        const historyList = document.getElementById('historyList'); historyList.innerHTML = '';
        const days = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let stats = {};
        for(let i=1; i<=days; i++) {
            (allData[`${selectedYear}_${selectedMonth}_${i}`] || []).forEach(t => {
                if(!stats[t.text]) stats[t.text] = { total: 0, done: 0 };
                stats[t.text].total++; if(t.done) stats[t.text].done++;
            });
        }
        const sorted = Object.keys(stats).sort();
        if(sorted.length === 0) { historyList.innerHTML = "<p style='text-align:center; font-size:12px; color:#AAA;'>No data recorded this month.</p>"; return; }
        
        sorted.forEach(name => {
            const acc = Math.round((stats[name].done/stats[name].total)*100);
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = `<div class="history-task-name">${name}</div>
                             <div class="history-stats">
                                <div class="history-perc">${acc}%</div>
                                <div class="history-count">${stats[name].done}/${stats[name].total} Done</div>
                             </div>`;
            historyList.appendChild(div);
        });
    }

    function updateAIMusic() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const habits = (allData[key] || []).map(h => h.text.toLowerCase()).join(" ");
        const status = document.getElementById('musicStatus');
        const container = document.getElementById('player-container');
        let vid = "jfKfPfyJRdk"; let mood = "Lofi Study Beats";

        if(habits.includes("math") || habits.includes("physics") || habits.includes("study")) { vid = "5qap5aO4i9A"; mood = "Focus Alpha Waves"; }
        else if(habits.includes("coding") || habits.includes("html") || habits.includes("js")) { vid = "u4D86T-K92s"; mood = "Synthwave Focus"; }

        status.innerText = `Playing: ${mood}`;
        container.innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/${vid}?autoplay=1&mute=0&loop=1&playlist=${vid}" frameborder="0" allow="autoplay"></iframe>`;
    }

    function initChart() {
        const ctx = document.getElementById('habitChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#B2AC88', backgroundColor: 'rgba(178,172,136,0.1)', fill: true, tension: 0.4, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false, beginAtZero: true, max: 100 }, x: { grid: { display: false }, ticks: { font: { size: 8 } } } } }
        });
    }

    function updateChart() {
        const days = new Date(selectedYear, monthsArr.indexOf(selectedMonth) + 1, 0).getDate();
        let l = []; let s = [];
        for(let i=1; i<=days; i++) {
            l.push(i); const h = allData[`${selectedYear}_${selectedMonth}_${i}`] || [];
            const d = h.filter(x => x.done).length; s.push(h.length ? Math.round((d/h.length)*100) : 0);
        }
        myChart.data.labels = l; myChart.data.datasets[0].data = s; myChart.update();
    }

    function calculateAchievements() {
        const key = `${selectedYear}_${selectedMonth}_${selectedDay}`;
        const h = allData[key] || []; const d = h.filter(x => x.done).length;
        const p = h.length ? Math.round((d/h.length)*100) : 0;
        document.getElementById('dailyPercentText').innerText = p + "%";
        document.getElementById('dailyMedal').innerText = p >= 90 ? "🥇 Gold" : (p >= 60 ? "🥉 Copper" : "No Medal");
        document.getElementById('dailyMedal').className = p >= 60 ? 'medal-badge active' : 'medal-badge';
    }

    function toggleHistory() { document.getElementById('historyBox').classList.toggle('open'); }
    function saveNote() { notesData[`${selectedYear}_${selectedMonth}_${selectedDay}`] = document.getElementById('dayNote').value; localStorage.setItem('HabitPro_Notes_Daily', JSON.stringify(notesData)); }
    function loadNote() { document.getElementById('dayNote').value = notesData[`${selectedYear}_${selectedMonth}_${selectedDay}`] || ''; }
    function openExport() { alert("Backup Code: " + btoa(JSON.stringify({allData, notesData}))); }
    function openRestore() { const code = prompt("Paste Backup Code:"); if(code) { try { const d = JSON.parse(atob(code)); allData = d.allData; notesData = d.notesData; updateUI(); } catch(e) { alert("Invalid!"); } } }
</script>
</body>
</html>
