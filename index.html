<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator - Funky Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .insta-card {
            background-color: white;
            border: 1px solid #dbdbdb;
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .calc-header {
            margin-bottom: 25px;
        }

        .logo-text {
            font-family: 'Brush Script MT', cursive;
            font-size: 3rem;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .slogan {
            font-size: 14px;
            color: #8e8e8e;
            margin-top: 5px;
            font-style: italic;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            background-color: #fafafa;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        .btn-calculate {
            width: 100%;
            padding: 12px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            margin-top: 5px;
        }

        #result-box {
            margin-top: 25px;
            display: none;
            padding: 15px;
            border-top: 1px solid #efefef;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .emoji-display {
            font-size: 40px;
            margin-bottom: 5px;
        }

        .percentage-text {
            font-size: 45px;
            font-weight: 900;
            color: #ed4956;
            margin-bottom: 10px;
        }

        .funky-msg {
            font-size: 15px;
            color: #262626;
            font-weight: 500;
            line-height: 1.4;
            padding: 12px;
            background: #fff5f6;
            border-radius: 10px;
        }

        footer {
            margin-top: 25px;
            font-size: 11px;
            color: #8e8e8e;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="insta-card">
        <div class="calc-header">
            <div class="logo-text">Love Calculator</div>
            <div class="slogan">" Not exact but exactly "</div>
        </div>

        <div class="input-group">
            <input type="text" id="name1" placeholder="আপনার নাম..." autocomplete="off">
        </div>
        <div class="input-group">
            <input type="text" id="name2" placeholder="পার্টনারের নাম..." autocomplete="off">
        </div>
        
        <button class="btn-calculate" onclick="startProcess()">Calculate ❤️</button>

        <div id="result-box">
            <div id="random-emoji" class="emoji-display">💖</div>
            <div class="percentage-text" id="final-score">0%</div>
            <div class="funky-msg" id="funky-text"></div>
        </div>

        <footer>FROM METAMISTRY</footer>
    </div>

    <script>
        // ইমোজি লিস্ট যা পার্সেন্টেজ অনুযায়ী র‍্যান্ডমলি আসবে
        const emojiData = {
            high: ["💍", "🔥", "👩‍❤️‍👨", "❤️‍🔥", "🌹", "👩‍❤️‍💋‍👨", "💎"],
            mid: ["✨", "🥰", "🍫", "🍕", "💖", "🧸", "🎈"],
            low: ["👃", "🎵", "🏊‍♂️", "☕", "🤡", "😶‍🌫️", "🪴"],
            fail: ["🥊", "🤮", "💀", "🏔️", "🧘‍♂️", "💩", "🚫"]
        };

        function startProcess() {
            const n1 = document.getElementById('name1').value.trim();
            const n2 = document.getElementById('name2').value.trim();
            
            if (!n1 || !n2) {
                alert("নাম না লিখলে ভালোবাসা মাপবো কী দিয়ে? বাতাস? 😂");
                return;
            }

            const score = ( (n1.length + n2.length) * 7 + (n1.charCodeAt(0) || 0) ) % 101;
            
            document.getElementById('result-box').style.display = "block";
            
            let count = 0;
            let timer = setInterval(() => {
                if (count >= score) {
                    clearInterval(timer);
                    updateUI(score);
                } else {
                    count++;
                    document.getElementById('final-score').innerText = count + "%";
                }
            }, 20);
        }

        function updateUI(val) {
            const emojiEl = document.getElementById('random-emoji');
            const textEl = document.getElementById('funky-text');
            
            let msg = "";
            let category = "";

            if (val >= 90) {
                category = "high";
                msg = "পুরো 'Made for each other'! বিয়েতে কিন্তু বিরিয়ানি চাই। 🍗🔥";
            } else if (val >= 75) {
                category = "high";
                msg = "হেব্বি ব্যাপার! তোদের জোড়ি পুরো আগুন, পাড়া জ্বলবে। 🌶️😎";
            } else if (val >= 60) {
                category = "mid";
                msg = "ভালোই! তবে মাঝে মাঝে ঝগড়া না করলে প্রেম জমে না। ☕😜";
            } else if (val >= 45) {
                category = "mid";
                msg = "ডাল-ভাত টাইপ রিলেশন, সারাজীবন টেনেটুনে টিকে যাবে। 🍚🤝";
            } else if (val >= 30) {
                category = "low";
                msg = "রিস্ক আছে বস! যেকোনো সময় ব্রেক-আপের গান বাজতে পারে। 📻💨";
            } else if (val >= 15) {
                category = "fail";
                msg = "তোরা কি মারপিট করার জন্য প্রেম করিস? জঘন্য! 🥊🙄";
            } else {
                category = "fail";
                msg = "ভাই তুই বরং হিমালয়ে চলে যা! এখানে তোর জন্য কিছু নেই। 🏔️🗿";
            }

            // র‍্যান্ডম ইমোজি সিলেক্ট করা
            const randomList = emojiData[category];
            const randomEmoji = randomList[Math.floor(Math.random() * randomList.length)];
            
            emojiEl.innerText = randomEmoji;
            textEl.innerText = val + "%: " + msg;
        }
    </script>
</body>
</html>
