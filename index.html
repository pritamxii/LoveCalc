<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calc Ultra Soft - Pritam Mistry</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #ff6b81; /* Softer Neon Red */
            --glass: rgba(255, 255, 255, 0.05); /* Softer Glass */
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #1a1a2e, #0f0f1a, #000);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; padding: 20px 0; color: var(--text);
        }

        /* Slowly Changing Background Glow */
        .bg-glow {
            position: fixed; top: 50%; left: 50%; width: 450px; height: 450px;
            background: var(--neon); filter: blur(150px);
            border-radius: 50%; z-index: -1; animation: orbit 25s infinite linear alternate;
            opacity: 0.5;
        }
        @keyframes orbit { from { transform: translate(-70%, -70%); } to { transform: translate(10%, 10%); } }

        /* Soft Ultra Glassmorphism Container */
        #capture-node {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--border);
            width: 95%; max-width: 440px;
            padding: 40px 25px; border-radius: 40px;
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.02) inset;
            position: relative; z-index: 10; transition: transform 0.3s ease;
        }

        .logo-text {
            font-family: 'Brush Script MT', cursive; font-size: 4rem;
            background: linear-gradient(45deg, #ff80a0, #ffdd55);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(255, 107, 129, 0.5));
        }

        /* Photo Upload Styling */
        .photo-upload-container {
            display: flex; justify-content: space-around; margin: 25px 0;
        }
        .upload-box {
            width: 110px; height: 110px; border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 50%; overflow: hidden; position: relative;
            background: rgba(255,255,255,0.02); cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.03) inset;
        }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .upload-box span { font-size: 11px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.7; color: var(--text);}

        input {
            width: 100%; padding: 15px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.04); border-radius: 15px;
            margin-bottom: 15px; color: var(--text); outline: none; transition: 0.3s;
            font-size: 15px;
        }
        input:focus { border-color: #ff9aaf; background: rgba(255,255,255,0.08); box-shadow: 0 0 12px rgba(255,107,129,0.3); }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, #ff6b81, #ff8fa0);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 8px 15px rgba(255,107,129,0.2); transition: 0.3s ease;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,107,129,0.3); }

        /* Neon Love Meter */
        .meter-container {
            width: 160px; height: 80px; position: relative; margin: 20px auto;
            overflow: hidden; border-radius: 160px 160px 0 0;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
        }
        #meter-fill {
            position: absolute; top: 100%; left: 50%; width: 100%; height: 100%;
            background: linear-gradient(to top, #ff6b81, #ffdd55);
            transform-origin: top center; transform: translateX(-50%) rotate(0deg);
            transition: transform 3s cubic-bezier(0.1, 0.7, 0.8, 0.1);
        }

        .percentage-text { font-size: 70px; font-weight: 700; margin: 10px 0; text-shadow: 0 0 18px var(--neon); color: var(--text);}

        #proposal-card {
            display: none; background: rgba(0,0,0,0.2); border-radius: 20px;
            padding: 22px; margin-top: 20px; border: 1px dashed rgba(255, 221, 0, 0.4);
            font-style: italic; font-size: 14px; color: #ffdd55; line-height: 1.5;
        }

        .floating-emoji {
            position: fixed; bottom: -12%; font-size: 30px; pointer-events: none;
            z-index: 1; animation: floatAnim 5s linear forwards;
        }
        @keyframes floatAnim {
            0% { transform: translateY(0) scale(0.6); opacity: 1; }
            100% { transform: translateY(-120vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .share-container { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap;}
        .share-btn { flex: 1; min-width: 120px; padding: 14px; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s ease;}
        .wa { background: #25D366; } .ig { background: #e1306c; }
        .share-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }

        .contact-us { margin-top: 35px; border-top: 1px solid var(--border); padding-top: 25px; }
        .contact-us p { color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .social-links a {
            display: inline-block; margin: 0 10px; color: var(--text); text-decoration: none;
            font-size: 12px; background: rgba(255,255,255,0.06); padding: 9px 18px; border-radius: 30px; transition: 0.3s;
        }
        .social-links a:hover { background: rgba(255,107,129,0.8); box-shadow: 0 0 10px rgba(255,107,129,0.3); }

        footer { margin-top: 20px; font-size: 10px; opacity: 0.3; letter-spacing: 4px; color: var(--text);}
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <audio id="loveSong" loop><source src="Real_love.mp3" type="audio/mpeg"></audio>

    <div id="capture-node">
        <div class="logo-text">Love Calc</div>
        <p style="font-size: 11px; opacity: 0.6; margin-bottom: 25px; color:var(--text); letter-spacing: 2px;">PREMIUM EDITION | BY PRITAM MISTRY</p>
        
        <div id="input-area">
            <div class="photo-upload-container">
                <div class="upload-box" onclick="document.getElementById('p1-input').click()">
                    <span id="p1-label">Your Photo</span>
                    <img id="p1-img" crossorigin="anonymous"> <input type="file" id="p1-input" hidden accept="image/*" onchange="preview(event, 'p1-img', 'p1-label')">
                </div>
                <div style="font-size: 35px; align-self: center; color: var(--neon); filter: drop-shadow(0 0 8px var(--neon));">❤️</div>
                <div class="upload-box" onclick="document.getElementById('p2-input').click()">
                    <span id="p2-label">Her Photo</span>
                    <img id="p2-img" crossorigin="anonymous"> <input type="file" id="p2-input" hidden accept="image/*" onchange="preview(event, 'p2-img', 'p2-label')">
                </div>
            </div>
            <input type="text" id="name1" placeholder="Your Name..." autocomplete="off">
            <input type="text" id="name2" placeholder="Her Name..." autocomplete="off">
            <button class="btn-main" onclick="startAnalysis()">Analyse Connection ❤️</button>
        </div>

        <div id="loader" style="display:none; margin: 30px 0;">
            <div style="font-size:70px; animation: heartbeat 1.5s infinite; filter: drop-shadow(0 0 10px var(--neon));">💖</div>
            <p style="color:var(--text); margin-top: 15px; letter-spacing: 1px;">Scanning Vibrations...</p>
        </div>

        <div id="result-box" style="display: none;">
            <div class="meter-container">
                <div id="meter-fill"></div>
            </div>
            <div class="percentage-text" id="score-val">0%</div>
            <h3 id="names-display" style="margin-bottom: 20px; font-weight: 300; color:var(--text); font-size: 22px;"></h3>
            
            <div style="background: rgba(255,255,255,0.04); padding:22px; border-radius:25px; border: 1px solid var(--border);">
                <b id="meme-label" style="display:block; color: #ffdd55; font-size: 19px; margin-bottom: 8px; font-weight: 600;"></b>
                <span id="final-msg" style="font-size: 14px; color:rgba(255,255,255,0.8); line-height: 1.4;"></span>
            </div>

            <div id="proposal-card"></div>
            
            <div class="share-container">
                <button onclick="shareResultViaAPI('WA')" class="share-btn wa">WhatsApp</button>
                <button onclick="shareResultViaAPI('IG')" class="share-btn ig">Instagram</button>
            </div>

            <button class="btn-main" style="margin-top:15px; background: transparent; border: 1px solid white;" onclick="downloadCard()">Save To Gallery 📸</button>
            <p onclick="location.reload()" style="cursor:pointer; font-size:15px; color:#0095f6; margin-top:20px; font-weight: bold;">Retry 🔄</p>
        </div>

        <div class="contact-us">
            <p>Created By Pritam</p>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1Du24h9PiY/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/pritamxii?igsh=MW1ja2N4MXhxMTdiYg==" target="_blank">Instagram</a>
            </div>
        </div>

        <footer>© 2026 PRITAM MISTRY</footer>
    </div>

    <script>
        const audio = document.getElementById('loveSong');
        let currentScore = 0; let n1="", n2="";

        function preview(event, imgId, labelId) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById(imgId);
                output.src = reader.result;
                output.style.display = 'block';
                document.getElementById(labelId).style.display = 'none';
                
                // ছবির cross-origin সমস্যা এড়াতে, এটি লোকাল ফাইল হলে প্রয়োজন নেই, কিন্তু অনলাইন হলে লাগবে
                output.setAttribute('crossorigin', 'anonymous');
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function startAnalysis() {
            n1 = document.getElementById('name1').value.trim();
            n2 = document.getElementById('name2').value.trim();
            if (!n1 || !n2) { alert("Please enter both names!"); return; }
            audio.play().catch(e=>{});
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(showResult, 2500);
        }

        function showResult() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('names-display').innerText = n1 + " + " + n2;

            let score = ((n1.length + n2.length) * 7 + (n1.charCodeAt(0) || 0)) % 101;
            if(score < 30) score += 35;
            currentScore = score;

            let cur = 0;
            const t = setInterval(() => {
                if (cur >= score) {
                    clearInterval(t);
                    finalizeUI(score);
                    spawnEmojis(score);
                } else {
                    cur++;
                    document.getElementById('score-val').innerText = cur + "%";
                    document.getElementById('meter-fill').style.transform = `translateX(-50%) rotate(${cur * 1.8}deg)`;
                }
            }, 30); // Slightly slower count up
        }

        function finalizeUI(s) {
            const label = document.getElementById('meme-label');
            const msg = document.getElementById('final-msg');
            const proposal = document.getElementById('proposal-card');
            
            if(s >= 90) {
                label.innerText="Perfect Match! 🤵👰";
                msg.innerText="তোরা একদম 'মেড ফর ইচ আদার'! বিয়েতে বিরিয়ানির লেগ পিসটা আমার জন্য বুক রাখিস।";
                proposal.style.display = 'block';
                proposal.innerText = `"Dear ${n2}, since the score says we are ${s}% compatible, I just want to say... You are the missing gear in my life! ❤️"`;
                confetti();
            } else if(s >= 70) {
                label.innerText="Super Hot Chemistry! 🔥";
                msg.innerText="তোদের জুটি একদম পারফেক্ট! জাস্ট ফাটিয়ে দে দোস্ত।";
            } else {
                label.innerText="Rust on the Gear! 💀";
                msg.innerText="তোর ইঞ্জিনে মনে হয় জং ধরেছে! আগে ফুচকা খাইয়ে ঠিক কর।";
            }
        }

        function spawnEmojis(score) {
            let list = score >= 70 ? ['❤️','💖','✨','💍','💍'] : ['💀','🚩','💔','🤣','🤣'];
            for(let i=0; i<18; i++) { // Fewer emojis for softer feel
                setTimeout(() => {
                    const e = document.createElement('div');
                    e.className = 'floating-emoji';
                    e.innerHTML = list[Math.floor(Math.random()*list.length)];
                    e.style.left = Math.random() * 100 + 'vw';
                    e.style.animationDuration = (Math.random() * 2 + 3.5) + 's'; // Slower float
                    document.body.appendChild(e);
                    setTimeout(() => e.remove(), 5500);
                }, i * 250);
            }
        }

        // --- ইমেজ এবং লিঙ্ক শেয়ারিং ম্যাজিক ---
        async function shareResultViaAPI(platform) {
            const text = `আমার আর ${n2}-এর ভালোবাসার স্কোর ${currentScore}%! ❤️ 체크 করো তোমারটা এই লিঙ্কে: ${window.location.href}`;
            const node = document.getElementById('capture-node');
            
            // বাটন সাময়িকভাবে লুকানো
            const elementsToHide = document.querySelectorAll('.share-container, .btn-main, p, .contact-us, footer');
            elementsToHide.forEach(el => el.style.visibility = 'hidden');

            try {
                // html2canvas দিয়ে ছবি ক্যাপচার (ছবি দুটি সহ)
                const canvas = await html2canvas(node, {
                    scale: 3, 
                    backgroundColor: null,
                    useCORS: true, //cross-origin সমস্যা ঠিক করার জন্য
                    logging: false,
                    onclone: (clonedDoc) => {
                        // ক্লোন করার সময় ছবিগুলো ঠিকমতো লোড হয়েছে কিনা নিশ্চিত করা
                        clonedDoc.querySelectorAll('img').forEach(img => {
                            if (!img.src) img.style.display = 'none';
                        });
                    }
                });
                
                // বাটন আবার দেখানো
                elementsToHide.forEach(el => el.style.visibility = 'visible');

                if (navigator.share) {
                    const blob = await (await fetch(canvas.toDataURL())).blob();
                    const file = new File([blob], 'LoveCalc_Result.png', { type: 'image/png' });
                    
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Love Calc Result',
                            text: text,
                        });
                    } catch (err) {
                        // শেয়ার মেনু বাতিল করলে বা ভুল হলে, লোকাল শেয়ার ব্যাকআপ
                        if (platform === 'WA') {
                            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
                        } else {
                            alert(`আপনার ব্রাউজার সরাসরি ছবি শেয়ার সাপোর্ট করছে না। রেজাল্ট কার্ডটি গ্যালারিতে সেভ করে শেয়ার করুন।`);
                        }
                    }
                } else {
                    // যদি Web Share API না থাকে, শুধু লিঙ্ক শেয়ার (যেমন কম্পিউটারে)
                    if (platform === 'WA') {
                        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
                    } else {
                        alert(`আপনার ব্রাউজার সরাসরি ছবি শেয়ার সাপোর্ট করছে না। রেজাল্ট কার্ডটি গ্যালারিতে সেভ করে শেয়ার করুন।`);
                    }
                }
            } catch (error) {
                // যদি html2canvas ফেল করে
                elementsToHide.forEach(el => el.style.visibility = 'visible');
                alert("শেয়ার করতে সমস্যা হয়েছে। রেজাল্ট কার্ডটি গ্যালারিতে সেভ করে শেয়ার করুন।");
                console.error("Canvas capture error:", error);
            }
        }

        // --- ছবি ডাউনলোড করার ফাংশন ---
        async function downloadCard() {
            const node = document.getElementById('capture-node');
            const elementsToHide = document.querySelectorAll('.share-container, .btn-main, p, .contact-us, footer');
            
            // বাটন লুকানো
            elementsToHide.forEach(el => el.style.visibility = 'hidden');

            try {
                // html2canvas দিয়ে ছবি ক্যাপচার
                const canvas = await html2canvas(node, {
                    scale: 3, 
                    backgroundColor: null,
                    useCORS: true, // Cross-origin সমস্যা ঠিক করার জন্য
                    logging: false,
                    onclone: (clonedDoc) => {
                        // ক্লোন করার সময় ছবিগুলো ঠিকমতো লোড হয়েছে কিনা নিশ্চিত করা
                        clonedDoc.querySelectorAll('img').forEach(img => {
                            if (!img.src) img.style.display = 'none';
                        });
                    }
                });
                
                // বাটন আবার দেখানো
                elementsToHide.forEach(el => el.style.visibility = 'visible');

                const link = document.createElement('a');
                link.download = `Love_Calc_Result_Pritam.png`;
                link.href = canvas.toDataURL();
                link.click();
            } catch (error) {
                // বাটন আবার দেখানো
                elementsToHide.forEach(el => el.style.visibility = 'visible');
                alert("রেজাল্ট সেভ করতে সমস্যা হয়েছে। দয়া করে স্ক্রিনশট নিন।");
                console.error("Canvas capture error:", error);
            }
        }
    </script>
</body>
</html>
